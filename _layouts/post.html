---
layout: default
---
<article class="post-page">
  <a class="back-link" href="{{ '/blog/' | relative_url }}">&larr; Back to benchmark blog</a>
  <p class="post-kicker">{{ page.date | date: "%d %B %Y" }}</p>
  <h1>{{ page.title }}</h1>
  {% if page.summary %}
    <p class="lede">{{ page.summary }}</p>
  {% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
